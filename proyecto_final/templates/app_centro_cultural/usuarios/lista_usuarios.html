<!DOCTYPE html>
<html lang="es">
    <h1>Usuarios registrados</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Editar</th>
                <th>Eliminar</th> 
            </tr>
        </thead>

        <tbody>
            {% for usuario in usuarios %}
            <tr>
                <td>{{ usuario.id }}</td>
                <td>
                    <a href="{% url 'detalle_usuario' usuario.id %}">
                        {{ usuario.nombre }}
                    </a>
                </td>
                <td>{{ usuario.email }}</td>
                <td>{{ usuario.telefono }}</td>
                <td><a href="{% url 'editar_usuario' usuario.id %}">Editar </a></td>
                <td><a href="{% url 'eliminar_usuario' usuario.id %}">Borrar </a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'nuevo_usuario' %}">Añadir nuevo usuario</a>
    <br>
</html>

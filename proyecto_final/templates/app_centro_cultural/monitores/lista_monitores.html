<!DOCTYPE html>
<html lang="es">
    <h1>Monitores disponibles</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Número de Actividades</th>
                <th>Especialización</th>
            </tr>
        </thead>

        <tbody>
            {% for monitor in monitores %}
            <tr>
                <td>{{ monitor.id }}</td>
                <td>
                    <a href="{% url 'detalle_monitor' monitor.id %}">
                        {{ monitor.nombre }}
                    </a>
                </td>
                <td>{{ monitor.numActividades }}</td>
                <td>{{ monitor.especializacioin }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</html>
